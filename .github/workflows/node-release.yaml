name: Node Release
run-name: Node Release [${{ github.ref_name }}] triggered by [${{ github.event_name }}/${{ github.actor }}]

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release and tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if gh release view "$VERSION" --repo ${{ github.repository }} 2>/dev/null; then
            echo "Release $VERSION already exists, skipping"
          else
            gh release create "$VERSION" --title "$VERSION" --notes "Release $VERSION" --repo ${{ github.repository }}
          fi
